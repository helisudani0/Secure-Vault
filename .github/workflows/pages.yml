name: Deploy Frontend

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: secure-vault-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: secure-vault-frontend/package-lock.json
      - uses: actions/configure-pages@v5
      - run: npm ci
      - name: Build frontend
        run: npm run build
        env:
          VITE_BASE_PATH: /Secure-Vault/
          VITE_API_URL: ${{ vars.BACKEND_API_URL }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: secure-vault-frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
