<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Privora</title>
    <script>
      // SPA routing fallback for GitHub Pages
      // Preserve the intended route and redirect to index.html
      var pathSegments = window.location.pathname.split('/').filter(Boolean);
      var basePath = '';
      
      // Find the base path (e.g., 'Secure-Vault')
      if (pathSegments.length > 0) {
        for (var i = 0; i < pathSegments.length; i++) {
          if (pathSegments[i] === 'Secure-Vault' || pathSegments[i].includes('github.io')) {
            basePath = '/' + pathSegments.slice(0, i + 1).join('/');
            break;
          }
        }
      }
      
      // Redirect to index.html with the original path as query param
      var redirect = (basePath || '/') + 'index.html?redirect=' + encodeURIComponent(window.location.pathname + window.location.search);
      window.location.replace(redirect);
    </script>
  </head>
  <body></body>
</html>
